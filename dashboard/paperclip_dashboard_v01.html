<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip Truth Machine | Professional Audit OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #00FFC8; overflow: hidden; height: 100vh; }
        .neon-border { box-shadow: 0 0 10px rgba(0, 255, 200, 0.2); border: 1px solid rgba(0, 255, 200, 0.4); }
        .critical-border { box-shadow: 0 0 15px rgba(255, 0, 60, 0.3); border: 1px solid rgba(255, 0, 60, 0.6); }
        .stamp-anim { animation: stamp 0.2s ease-in; }
        @keyframes stamp { 0% { transform: scale(5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .doc-page { background: #111; border: 1px solid #333; height: 80vh; overflow-y: auto; position: relative; }
        .highlight-box { position: absolute; background: rgba(255, 0, 60, 0.2); border: 2px solid #FF003C; pointer-events: none; transition: all 0.3s ease; }
        .evidence-card { transition: all 0.2s ease; cursor: pointer; border-left: 3px solid #333; }
        .evidence-card:hover { background: rgba(0, 255, 200, 0.1); border-left-color: #00FFC8; }
        .evidence-card.active { background: rgba(0, 255, 200, 0.2); border-left-color: #00FFC8; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #1a1a1a; }
        input[type=range]::-webkit-slider-thumb { height: 20px; width: 10px; background: #00FFC8; -webkit-appearance: none; }
    </style>
</head>
<body class="p-4 flex flex-col gap-4">
    <header class="flex justify-between items-center p-4 neon-border bg-black/50">
        <div class="flex items-center gap-6">
            <span class="text-xs opacity-50 uppercase tracking-widest font-bold">S-Sentry Calibration</span>
            <div class="flex items-center gap-3">
                <label class="text-xs">SENSITIVITY</label>
                <input type="range" id="sensitivity" min="50" max="95" value="75" class="w-48">
                <span id="sens-value" class="text-sm font-bold w-10">75%</span>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <div class="text-right">
                <span class="text-xs opacity-50 uppercase tracking-widest">Session:</span>
                <span class="text-xs font-mono ml-2">AUDIT_C-BETA_02</span>
            </div>
            <div class="text-sm font-bold animate-pulse">● SYSTEM_ACTIVE</div>
        </div>
    </header>

    <main class="flex flex-1 gap-4 overflow-hidden">
        <!-- Left: The Stream -->
        <aside class="w-64 flex flex-col p-3 neon-border bg-black/30 overflow-y-auto">
            <h2 class="text-xs font-bold uppercase opacity-40 mb-4 border-b border-white/10 pb-2">Sample Queue</h2>
            <div id="stream-list" class="flex flex-col gap-2"></div>
        </aside>

        <!-- Center: The Workspace -->
        <section class="flex-1 flex flex-col gap-4 relative">
            <!-- Mode Switch -->
            <div class="flex justify-center gap-2 mb-2">
                <button id="btn-verdict" onclick="setMode('verdict')" class="px-4 py-1 text-xs border border-cyan-500 bg-cyan-500/20 text-cyan-400 uppercase tracking-widest hover:bg-cyan-500/40 transition-all">Verdict Mode</button>
                <button id="btn-audit" onclick="setMode('audit')" class="px-4 py-1 text-xs border border-white/20 text-white/60 uppercase tracking-widest hover:bg-white/10 transition-all">Audit View</button>
            </div>

            <!-- Verdict Content -->
            <div id="view-verdict" class="flex-1 flex flex-col items-center justify-center neon-border bg-black/50 relative">
                <div class="text-center">
                    <div class="text-xs opacity-40 mb-2 uppercase tracking-widest">Current Subject</div>
                    <div id="current-id" class="text-4xl font-bold tracking-widest mb-8">SAMP-VOID</div>
                    <div id="stamp-container" class="h-64 flex items-center justify-center">
                        <div id="stamp" class="hidden text-8xl font-black px-16 py-6 border-[12px] border-double uppercase stamp-anim">DENIED</div>
                    </div>
                </div>
                <div class="absolute bottom-10">
                    <button onclick="runAudit()" class="px-12 py-3 bg-[#00FFC8] text-black font-bold hover:bg-white transition-all uppercase text-sm tracking-widest">Execute Audit</button>
                </div>
            </div>

            <!-- Audit View Content -->
            <div id="view-audit" class="hidden flex-1 flex flex-col neon-border bg-black/50 overflow-hidden">
                <div class="flex-1 flex gap-4 p-4">
                    <div id="doc-viewer" class="flex-1 doc-page p-8 text-gray-400 text-sm leading-relaxed overflow-y-auto relative">
                        <!-- Document content generated by JS -->
                        <div id="doc-text"></div>
                        <div id="highlight" class="highlight-box hidden"></div>
                    </div>
                    <div class="w-1/3 flex flex-col gap-2 overflow-y-auto" id="context-ref">
                        <h3 class="text-xs font-bold opacity-40 uppercase mb-2">EHDS Reference</h3>
                        <div id="ref-content" class="p-3 bg-white/5 border border-white/10 text-xs italic leading-relaxed">
                            Select a violation to see the regulatory reference.
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Evidence Chain -->
        <aside class="w-80 flex flex-col p-3 neon-border bg-black/30 overflow-y-auto">
            <h2 class="text-xs font-bold uppercase opacity-40 mb-4 border-b border-white/10 pb-2">Evidence Chain</h2>
            <div id="evidence-list" class="flex flex-col gap-3"></div>
        </aside>
    </main>

    <footer class="h-16 p-2 neon-border bg-black/50 overflow-y-auto text-[10px] opacity-60 font-mono" id="system-log">
        <div>[SYSTEM] Truth Machine v0.2 | Neuro-Symbolic Storage Mode Active.</div>
    </footer>

    <script>
        const ehds_library = {
            'Art. 22(1)(a)': 'Data subjects must provide explicit, informed, and granular consent for the secondary use of health data, ensuring clear opt-out mechanisms.',
            'Art. 31(b)': 'Cross-border transmission of sensitive health data to third countries is prohibited unless the recipient jurisdiction provides a level of protection essentially equivalent to that of the EU.',
            'Art. 12(c)': 'Clinical data reports must maintain strict linguistic and technical professional standards to prevent fraud or a misleading representation of efficacy.'
        };

        const mockData = [
            { 
                id: 'SAMP-PHARMA-001', risk: 0.9, 
                text: 'The project aims for a revolutionary breakthrough in cognitive enhancement. Regarding the informed consent, all participants were notified of the general objective, and this approach is generally accepted within the pharmaceutical industry. Data will be exported from Node-A (Frankfurt) via S3-Temp-SGP (Singapore) for pre-processing before final archiving in Node-B (Brussels). Note: S3-Temp-SGP is a 48h buffer. Pharmacokinetics analysis suggests a half-life of 4.2 hours. Side effects: minor insomnia reported.',
                evidence: [
                    { loc: 'p1-l3', snippet: 'generally accepted', law: 'Art. 22(1)(a)', note: 'SEMANTIC EVASION' },
                    { loc: 'p1-l5', snippet: 'S3-Temp-SGP (Singapore)', law: 'Art. 31(b)', note: 'CROSS-BORDER VIOLATION' },
                    { loc: 'p1-l7', snippet: 'Pharmacokinetics', law: 'Art. 12(c)', note: 'Linguistic failure suggest fraud' }
                ], 
                label: 'DENIED' 
            },
            { 
                id: 'SAMP-BIO-002', risk: 0.2, 
                text: 'Study focusing on Protein Alpha synthesis. All participants signed explicit consent forms compliant with EHDS guidelines. All data processing remains within the EU region. Technical standards are fully met.',
                evidence: [], 
                label: 'APPROVED' 
            }
        ];

        let activeIndex = 0;
        const sensSldr = document.getElementById('sensitivity');
        const sensVal = document.getElementById('sens-value');
        const streamList = document.getElementById('stream-list');
        const currentId = document.getElementById('current-id');
        const stamp = document.getElementById('stamp');
        const evidenceList = document.getElementById('evidence-list');
        const sysLog = document.getElementById('system-log');
        const docText = document.getElementById('doc-text');
        const highlight = document.getElementById('highlight');
        const refContent = document.getElementById('ref-content');

        function initStream() {
            streamList.innerHTML = '';
            mockData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `p-2 cursor-pointer transition-all border-l-2 ${item.risk > 0.7 ? 'border-red-500 bg-red-900/10' : 'border-cyan-500 bg-cyan-900/10'} hover:bg-white/10`;
                div.innerHTML = `<span class="text-xs font-bold">${item.id}</span> <span class="text-[10px] opacity-50 float-right">${item.risk > 0.7 ? '[!!]' : '[✓]'}</span>`;
                div.onclick = () => selectSample(idx);
                streamList.appendChild(div);
            });
        }

        function selectSample(idx) {
            activeIndex = idx;
            currentId.innerText = mockData[idx].id;
            stamp.classList.add('hidden');
            evidenceList.innerHTML = '';
            document.getElementById('doc-text').innerText = mockData[idx].text;
            highlight.classList.add('hidden');
            refContent.innerText = 'Select a violation to see the regulatory reference.';
            log(`Subject shifted to ${mockData[idx].id}`);
        }

        function setMode(mode) {
            if(mode === 'verdict') {
                document.getElementById('view-verdict').classList.remove('hidden');
                document.getElementById('view-audit').classList.add('hidden');
                document.getElementById('btn-verdict').className = 'px-4 py-1 text-xs border border-cyan-500 bg-cyan-500/20 text-cyan-400 uppercase tracking-widest hover:bg-cyan-500/40 transition-all';
                document.getElementById('btn-audit').className = 'px-4 py-1 text-xs border border-white/20 text-white/60 uppercase tracking-widest hover:bg-white/10 transition-all';
            } else {
                document.getElementById('view-verdict').classList.add('hidden');
                document.getElementById('view-audit').classList.remove('hidden');
                document.getElementById('btn-audit').className = 'px-4 py-1 text-xs border border-cyan-500 bg-cyan-500/20 text-cyan-400 uppercase tracking-widest hover:bg-cyan-500/40 transition-all';
                document.getElementById('btn-verdict').className = 'px-4 py-1 text-xs border border-white/20 text-white/60 uppercase tracking-widest hover:bg-white/10 transition-all';
            }
        }

        function log(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            sysLog.appendChild(div);
            sysLog.scrollTop = sysLog.scrollHeight;
        }

        function runAudit() {
            const sample = mockData[activeIndex];
            const currentSens = parseInt(sensSldr.value);
            log(`Executing audit for ${sample.id} (S-Sentry: ${currentSens}%)...`);
            currentId.innerText = "ANALYZING...";
            stamp.classList.add('hidden');
            
            setTimeout(() => {
                currentId.innerText = sample.id;
                const isDenied = sample.risk > (1 - (100 - currentSens)/100);
                stamp.innerText = isDenied ? 'DENIED' : 'APPROVED';
                stamp.className = `text-7xl font-black px-16 py-6 border-[12px] border-double uppercase stamp-anim ${isDenied ? 'border-red-600 text-red-600' : 'border-cyan-600 text-cyan-600'}`;
                stamp.classList.remove('hidden');

                evidenceList.innerHTML = '';
                if (isDenied) {
                    sample.evidence.forEach((ev, idx) => {
                        const card = document.createElement('div');
                        card.className = 'evidence-card p-3 bg-white/5 border-white/10 text-xs';
                        card.innerHTML = `
                            <div class="flex justify-between mb-1"><span class="text-red-500 font-bold">${ev.note}</span><span class="opacity-40">${ev.loc}</span></div>
                            <div class="text-white/80 italic">"${ev.snippet}"</div>
                            <div class="mt-2 text-[10px] text-cyan-500 uppercase tracking-tighter">Law: ${ev.law}</div>
                        `;
                        card.onclick = () => focusEvidence(ev);
                        evidenceList.appendChild(card);
                    });
                } else {
                    evidenceList.innerHTML = '<div class="text-cyan-400 italic p-2">No critical anomalies detected. Path clear.</div>';
                }
                log(`Verdict: ${stamp.innerText} for ${sample.id}`);
            }, 600);
        }

        function focusEvidence(ev) {
            setMode('audit');
            const text = document.getElementById('doc-text').innerText;
            const index = text.indexOf(ev.snippet);
            if (index === -1) return;

            // Simple visual highlighting simulation
            const range = document.createRange();
            const span = document.createElement('span');
            span.innerText = ev.snippet;
            docText.appendChild(span);
            const rect = span.getBoundingClientRect();
            
            highlight.style.top = (rect.top + docText.offsetTop) + 'px';
            highlight.style.left = (rect.left + docText.offsetLeft) + 'px';
            highlight.style.width = rect.width + 'px';
            highlight.style.height = rect.height + 'px';
            highlight.classList.remove('hidden');
            
            // Clean up span and remove it immediately, just used for rect
            span.remove();

            refContent.innerHTML = `
                <div class="text-cyan-400 font-bold mb-2">${ev.law}</div>
                <div class="text-white/70">${ehds_library[ev.law] || 'Reference not found in current library.'}</div>
            `;
        }

        sensSldr.oninput = () => {
            sensVal.innerText = sensSldr.value + '%';
            sensVal.className = sensSldr.value > 85 ? 'text-sm font-bold w-10 text-red-500 animate-pulse' : 'text-sm font-bold w-10';
        };

        initStream();
        selectSample(0);
    </script>
</body>
</html>
